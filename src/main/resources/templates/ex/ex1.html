<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <!-- /*<h4>[[${list}]]</h4>*/-->
    <hr/>
    <h4 th:text="${list}"></h4>
    <div th:with="num1 = ${10} , num2 = ${20}">
        <h4 th:text="${num1 + num2}"></h4>
    </div>

    <ul>
        <li th:each="str: ${list}" th:text="${str}"></li>
    </ul>

    <ul>
        <th:block th:each="str : ${list}"> <!--  th블럭을 사용하는경우  -->
            <li>[[${str}]]</li>
        </th:block>
    </ul>
<!--        둘이 동일한 결과 출력-->
    <hr/>
    <li th:each="str, status: ${list}">
        [[${status.index}]] -- [[${str}]]
    </li>
    <hr/>
    <ul>
        <li th:each="str,status: ${list}">
            <span th:if="${status.odd}"> ODD -- [[${str}]]</span><!--   status.odd가 true면-->
            <span th:unless="${status.odd}"> EVEN --[[${str}]]</span><!--  status.odd가 false면-->
        </li>
    </ul>
    <hr/>
    <ul>
        <li th:each="str,status : ${list}">
            <span th:text="${status.odd} ? 'ODD ---' + ${str} : 'EVEN ---'+${str}"></span>
        </li>
    </ul>

    <hr/>
    <ul>
        <li th:each="str,status: ${list}">
            <th:block th:switch="${status.index % 3}">
                <span th:case="0">0</span>
                <span th:case="1">1</span>
                <span th:case="2">2</span>
            </th:block>
        </li>
    </ul>
    <hr/>
            <a th:href="@{/hello(name ='AAA' , age = 16)}">Go to /hello </a>

            <a th:href="@{/hello(name ='한글처리' , age = 16)}">Go to /hello </a>

            <a th:href="@{/hello(types=${ { 'AA','BB','CC' }} , age=16)}">Go to /hello </a>

</body>
</html>
